name: Generate TLDR Podcast

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install feedparser gtts beautifulsoup4

      - run: python generate.py

      - name: Commit MP3
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add *.mp3
          git commit -m "Daily episode" || echo "No changes"
          git push  
